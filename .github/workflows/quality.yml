name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black flake8 pylint mypy
        pip install -r requirements.txt

    - name: Run Black formatter check
      run: |
        black --check --diff enhanced_rag_system.py test_enhanced_rag_system.py

    - name: Run Flake8
      run: |
        flake8 enhanced_rag_system.py --max-line-length=120 --extend-ignore=E203,W503

    - name: Run Pylint
      run: |
        pylint enhanced_rag_system.py --max-line-length=120 --disable=C0111,R0913,R0914,R0915 || true

    - name: Security check with bandit
      run: |
        pip install bandit
        bandit -r enhanced_rag_system.py -ll || true
